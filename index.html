// ── 홈 ──
function Home({user,onQuiz,onReview}){
  const [prog,setProg]=useState({});
  const [loading,setLoading]=useState(true);
  const [showReset,setShowReset]=useState(false);
  const [resumeModal,setResumeModal]=useState(null); // {day,round} or null

  useEffect(()=>{load();},[]);

  const load=async()=>{
    const {data}=await sb.from('progress').select('*').eq('user_id',user.id);
    const m={};
    if(data) data.forEach(r=>{if(!m[r.day])m[r.day]={};m[r.day][r.round]=true;});
    setProg(m);
    setLoading(false);
  };

  const handleReset=async()=>{
    await sb.from('progress').delete().eq('user_id',user.id);
    setProg({});
    setShowReset(false);
  };

  const done=DAYS.reduce((a,d)=>a+(prog[d]?.[1]&&prog[d]?.[2]?1:0),0);
  const total=DAYS.length;

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {showReset&&<ResetModal onConfirm={handleReset} onCancel={()=>setShowReset(false)}/>}
      {resumeModal&&(
        <ResumeModal
          day={resumeModal.day}
          round={resumeModal.round}
          onResume={()=>{setResumeModal(null);onQuiz(resumeModal.day,resumeModal.round);}}
          onRestart={()=>{setResumeModal(null);onQuiz(resumeModal.day,1);}}
          onClose={()=>setResumeModal(null)}
        />
      )}

      {/* 헤더 */}
      <div style={{background:'white',borderBottom:`1px solid ${C.border}`,padding:'0 24px',position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:760,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:60}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontFamily:'DM Serif Display',fontSize:19,color:C.accent}}>Vocab Boost</span>
            <span style={{background:C.accentLight,color:C.accent,fontSize:11,padding:'2px 9px',borderRadius:100,fontWeight:700}}>선덕고</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:13,color:C.t2}}>{user.user_metadata?.name||user.email}</span>
            <button onClick={()=>setShowReset(true)} style={{background:'#fee2e2',color:C.err,padding:'6px 14px',borderRadius:8,fontSize:13,fontWeight:600}}>초기화</button>
            <button onClick={()=>{sessionStorage.clear();sb.auth.signOut();}} style={{background:'#f0f1f8',color:C.t2,padding:'6px 14px',borderRadius:8,fontSize:13,fontWeight:500}}>로그아웃</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:760,margin:'0 auto',padding:'28px 24px'}}>
        {/* 진행률 */}
        <div style={{background:'white',borderRadius:20,padding:'24px 28px',marginBottom:16,boxShadow:'0 2px 12px rgba(91,80,232,0.07)',animation:'fadeIn 0.4s ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <div>
              <p style={{fontSize:16,fontWeight:700,color:C.t1,marginBottom:3}}>전체 진행률</p>
              <p style={{fontSize:12,color:C.t3}}>부스터보카 어원편 Day 16–30</p>
            </div>
            <p style={{fontFamily:'JetBrains Mono',fontSize:26,color:C.accent,fontWeight:600}}>
              {done}<span style={{fontSize:14,color:C.t3}}>/{total}</span>
            </p>
          </div>
          <div style={{height:8,background:'#f0f1f8',borderRadius:100,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(done/total)*100}%`,background:`linear-gradient(90deg,${C.accent},#a78bfa)`,borderRadius:100,transition:'width 0.6s ease'}}/>
          </div>
          <p style={{marginTop:7,fontSize:12,color:C.t3}}>{Math.round((done/total)*100)}% 완료</p>
        </div>

        {/* 총괄 리뷰 */}
        <button onClick={onReview}
          style={{width:'100%',padding:'18px 22px',background:'white',border:`1.5px solid ${C.border}`,borderRadius:16,display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,boxShadow:'0 2px 12px rgba(91,80,232,0.06)',transition:'all 0.15s',animation:'fadeIn 0.4s ease'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.transform='translateY(-2px)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='translateY(0)'}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div style={{width:44,height:44,background:C.accentLight,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📝</div>
            <div style={{textAlign:'left'}}>
              <p style={{fontSize:15,fontWeight:700,color:C.t1,marginBottom:2}}>총괄 리뷰테스트</p>
              <p style={{fontSize:12,color:C.t2}}>전체 381단어 · 문제은행식 주관식</p>
            </div>
          </div>
          <span style={{fontSize:16,color:C.accent,fontWeight:700}}>→</span>

        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {loading
            ? <p style={{color:C.t3,textAlign:'center',padding:32}}>불러오는 중...</p>
            : DAYS.map((day,i)=>{

                const r2=prog[day]?.[2]||false;
                const allDone=r1&&r2;
                return(
                  <div key={day}
                    style={{background:'white',borderRadius:14,padding:'15px 20px',boxShadow:'0 1px 6px rgba(0,0,0,0.05)',border:`1.5px solid ${allDone?'#86efac':C.border}`,animation:`fadeIn 0.3s ease ${i*0.03}s both`,transition:'box-shadow 0.15s'}}
                    onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.09)'}
                    onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 6px rgba(0,0,0,0.05)'}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
                      <div style={{display:'flex',alignItems:'center',gap:14}}>
                        <div style={{width:40,height:40,background:allDone?C.okLight:C.accentLight,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'JetBrains Mono',fontSize:13,fontWeight:700,color:allDone?C.ok:C.accent,flexShrink:0}}>
                          {allDone?'✓':day}
                        </div>
                        <div>
                          <p style={{fontWeight:700,fontSize:14,color:C.t1,marginBottom:4}}>Day {day}</p>
                          <div style={{display:'flex',gap:5}}>
                            {[{done:r1,label:'1회 객관식'},{done:r2,label:'2회 주관식'}].map(b=>(
                              <span key={b.label} style={{fontSize:11,padding:'2px 8px',borderRadius:100,background:b.done?C.okLight:'#f0f1f8',color:b.done?C.ok:C.t3,fontWeight:500}}>

                              </span>
                            ))}
                          </div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:7}}>
                        {[
                          {round:1,label:'1회',sub:'객관식',done:r1,disabled:false},
                          {round:2,label:'2회',sub:'주관식',done:r2,disabled:!r1}
                        ].map(b=>(
                          <button key={b.round}
                            onClick={()=>{
                              if(b.done){
                                setResumeModal({day,round:b.round});
                              } else {
                                onQuiz(day,b.round);
                              }
                            }}
                            disabled={b.disabled}
                            style={{padding:'7px 13px',borderRadius:10,background:b.done?C.okLight:b.disabled?'#f0f1f8':C.accentLight,color:b.done?C.ok:b.disabled?C.t3:C.accent,opacity:b.disabled?0.5:1,fontWeight:700,fontSize:12,display:'flex',flexDirection:'column',alignItems:'center',gap:1,transition:'all 0.15s'}}
                            onMouseEnter={e=>{if(!b.disabled)e.currentTarget.style.transform='translateY(-2px)'}}
                            onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
                            <span>{b.done?'재도전':b.label}</span>
                            <span style={{fontSize:10,opacity:0.7,fontWeight:400}}>{b.sub}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })
          }
        </div>
      </div>
    </div>
  );
}

// ── 퀴즈 ──
function Quiz({user,day,round,onBack,onDone}){
  const origRef=useRef([]);
  const extraRef=useRef([]);
  const oi=useRef(0);
  const ei=useRef(0);
  const solvedRef=useRef(new Set());
  const wrongCountRef=useRef({});

  const [tick,setTick]=useState(0);
  const [allW,setAllW]=useState([]);
  const [choices,setChoices]=useState([]);
  const [sel,setSel]=useState(null);
  const [ans,setAns]=useState('');
  const [fb,setFb]=useState(null);
  const [loading,setLoading]=useState(true);
  const [isDone,setIsDone]=useState(false);
  const [wrongs,setWrongs]=useState(0);
  const inputRef=useRef(null);

  const re=()=>setTick(t=>t+1);

  useEffect(()=>{
    (async()=>{
      const [{data:dw},{data:aw}]=await Promise.all([
        sb.from('words').select('*').eq('day',day).order('id'),
        sb.from('words').select('*')
      ]);
      if(dw) origRef.current=[...dw].sort(()=>Math.random()-0.5);
      if(aw) setAllW(aw);
      setLoading(false);
      re();
    })();
  },[]);

  useEffect(()=>{
    if(round===2&&!loading&&fb===null&&inputRef.current) inputRef.current.focus();
  },[tick,fb,loading]);

  const cur=oi.current<origRef.current.length
    ? origRef.current[oi.current]
    : (ei.current<extraRef.current.length?extraRef.current[ei.current]:null);

  const inOrig=()=>oi.current<origRef.current.length;

  useEffect(()=>{
    if(round===1&&cur&&allW.length>0){
      const o=allW.filter(x=>x.id!==cur.id).sort(()=>Math.random()-0.5).slice(0,3);
      setChoices([...o,cur].sort(()=>Math.random()-0.5));
    }
  },[tick,allW]);

  const goNext=()=>{
    if(inOrig()) oi.current++;
    else ei.current++;
    re();
  };

  const correct=()=>{
    if(!cur) return;
    if(inOrig()) solvedRef.current.add(cur.id);
    const allOrigSolved=solvedRef.current.size>=origRef.current.length;
    const isLastExtra=!inOrig()&&(ei.current+1)>=extraRef.current.length;
    if(allOrigSolved&&(inOrig()||isLastExtra)){
      setFb('ok');
      setTimeout(()=>{setFb(null);finish();},1000);
      return;
    }
    setFb('ok');
    setTimeout(()=>{
      setFb(null);setSel(null);setAns('');
      goNext();
    },1000);
  };

  const wrong=()=>{
    if(cur){
      wrongCountRef.current[cur.id]=(wrongCountRef.current[cur.id]||0)+1;
    }
    setWrongs(n=>n+1);
    setFb('no');
  };

  const wrongNext=()=>{
    if(!cur) return;
    extraRef.current.push(cur);
    setFb(null);setSel(null);setAns('');
    goNext();
  };

  const finish=()=>{
    setIsDone(true);
    sb.from('progress').upsert(
      {user_id:user.id,day,round,completed:true,completed_at:new Date().toISOString()},
      {onConflict:'user_id,day,round'}
    );
  };

  const pickChoice=(c)=>{ if(fb!==null) return; setSel(c.id); c.id===cur.id?correct():wrong(); };
  const submit=()=>{
    if(!ans.trim()||fb!==null) return;
    const n=s=>s.trim().toLowerCase().replace(/[-\s]/g,'');
    n(ans)===n(cur.word)?correct():wrong();
  };
  const keyDown=(e)=>{ if(e.key==='Enter'){ if(fb===null) submit(); else if(fb==='no') wrongNext(); } };

  const totalOrig=origRef.current.length;
  const solvedCount=solvedRef.current.size;
  const pct=totalOrig>0?Math.min((solvedCount/totalOrig)*100,99):0;

  if(loading) return <Spin/>;

  if(!isDone&&!cur&&origRef.current.length>0){finish();}

  if(isDone){
    return(
      <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{maxWidth:380,width:'100%',background:'white',borderRadius:24,padding:'44px 36px',textAlign:'center',boxShadow:'0 8px 40px rgba(91,80,232,0.12)',animation:'fadeIn 0.5s ease'}}>
          <div style={{fontSize:52,marginBottom:12}}>{wrongs===0?'🏆':wrongs<5?'🎯':'💪'}</div>
          <p style={{fontSize:22,fontWeight:700,color:C.t1,marginBottom:6}}>Day {day} {round===1?'객관식':'주관식'} 완료!</p>
          <p style={{fontSize:13,color:C.t2,marginBottom:28}}>총 {totalOrig}단어 · 틀린 횟수 {wrongs}번</p>
          {round===1?(
            <div style={{display:'flex',gap:10}}>
              <button onClick={onBack} style={{flex:1,padding:13,background:'#f0f1f8',borderRadius:12,color:C.t2,fontSize:14,fontWeight:500}}>홈으로</button>
              <button onClick={()=>onDone(1)} style={{flex:1,padding:13,background:C.accent,borderRadius:12,color:'white',fontSize:14,fontWeight:700}}>2회 주관식 →</button>
            </div>
          ):(
            <button onClick={onBack} style={{width:'100%',padding:13,background:C.accent,borderRadius:12,color:'white',fontSize:15,fontWeight:700}}>홈으로</button>
          )}
        </div>
      </div>
    );
  }

  if(!cur) return <Spin/>;

  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <div style={{background:'white',borderBottom:`1px solid ${C.border}`,padding:'0 20px'}}>
        <div style={{maxWidth:620,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
          <button onClick={onBack} style={{background:'transparent',color:C.t2,fontSize:13,fontWeight:500}}>← 돌아가기</button>
          <p style={{fontSize:13,fontWeight:700,color:C.t1}}>Day {day} · {round===1?'1회 객관식':'2회 주관식'}</p>
          <p style={{fontFamily:'JetBrains Mono',fontSize:12,color:C.t2}}>{solvedCount}/{totalOrig}</p>
        </div>
      </div>
      <div style={{height:3,background:'#f0f1f8'}}>
        <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${C.accent},#a78bfa)`,transition:'width 0.4s ease'}}/>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
        <div style={{maxWidth:540,width:'100%'}}>
          {round===1?(
            <div style={{animation:'fadeIn 0.3s ease'}}>
              <div style={{background:'white',borderRadius:20,padding:'40px 32px',textAlign:'center',marginBottom:16,boxShadow:'0 2px 12px rgba(91,80,232,0.07)'}}>
                <p style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:14}}>다음 단어의 뜻은?</p>
                <p style={{fontFamily:'DM Serif Display',fontSize:42,color:C.t1}}>{cur.word}</p>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
                {choices.map((c,i)=>{
                  let bg='white',border=C.border,color=C.t1;
                  if(fb!==null){
                    if(c.id===cur.id){bg=C.okLight;border='#86efac';color=C.ok;}
                    else if(c.id===sel){bg=C.errLight;border='#fca5a5';color=C.err;}
                  }
                  return(
                    <button key={c.id} onClick={()=>pickChoice(c)} disabled={fb!==null}
                      style={{width:'100%',padding:'14px 18px',background:bg,border:`1.5px solid ${border}`,borderRadius:12,color,textAlign:'left',fontSize:14,lineHeight:1.6,display:'flex',alignItems:'flex-start',gap:12,boxShadow:'0 1px 4px rgba(0,0,0,0.04)',transition:'all 0.15s'}}
                      onMouseEnter={e=>{if(fb===null){e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.transform='translateY(-1px)'}}}
                      onMouseLeave={e=>{if(fb===null){e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='translateY(0)'}}}>
                      <span style={{minWidth:24,height:24,background:'#f0f1f8',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontFamily:'JetBrains Mono',fontWeight:700,color:C.t3,flexShrink:0}}>{i+1}</span>
                      <span>{c.meaning}</span>
                    </button>
                  );
                })}
              </div>
              {fb==='ok'&&<FbOk/>}
              {fb==='no'&&<FbNo onNext={wrongNext}/>}
            </div>
          ):(
            <div style={{animation:'fadeIn 0.3s ease'}}>
              <div style={{background:'white',borderRadius:20,padding:'40px 32px',textAlign:'center',marginBottom:16,boxShadow:'0 2px 12px rgba(91,80,232,0.07)'}}>
                <p style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:14}}>영어 단어를 입력하세요</p>
                <p style={{fontSize:20,color:C.t1,lineHeight:1.7,fontWeight:500}}>{cur.meaning}</p>
              </div>
              <div style={{position:'relative',marginBottom:12}}>
                <input ref={inputRef} value={ans} onChange={e=>setAns(e.target.value)} onKeyDown={keyDown}
                  disabled={fb!==null} placeholder="영어 단어 입력 후 Enter"
                  style={{width:'100%',padding:'16px 70px 16px 20px',
                    background:fb==='ok'?C.okLight:fb==='no'?C.errLight:'white',
                    border:`2px solid ${fb==='ok'?'#86efac':fb==='no'?'#fca5a5':C.border}`,
                    borderRadius:14,color:C.t1,fontSize:22,fontFamily:'DM Serif Display',
                    boxShadow:'0 2px 8px rgba(0,0,0,0.05)',transition:'border-color 0.2s',
                    animation:fb==='no'?'shake 0.4s ease':'none'}}/>
                <button onClick={submit} disabled={fb!==null||!ans.trim()}
                  style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
                    padding:'8px 14px',background:ans.trim()&&!fb?C.accent:'#f0f1f8',
                    borderRadius:9,color:ans.trim()&&!fb?'white':C.t3,fontSize:13,fontWeight:700}}>확인</button>
              </div>
              {fb==='ok'&&<FbOk/>}
              {fb==='no'&&(
                <div style={{background:C.errLight,border:'1.5px solid #fca5a5',borderRadius:12,padding:'14px 18px',animation:'fadeIn 0.3s ease'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <p style={{fontSize:13,color:C.err,fontWeight:700}}>틀렸어요!</p>
                    <button onClick={wrongNext} style={{padding:'6px 14px',background:C.err,borderRadius:8,color:'white',fontSize:13,fontWeight:700}}>다음 (Enter)</button>
                  </div>
                  <p style={{fontSize:13,color:C.t2}}>정답: <span style={{fontFamily:'DM Serif Display',fontSize:18,color:C.t1,fontWeight:700}}>{cur.word}</span></p>
                  <p style={{fontSize:11,color:C.t3,marginTop:3}}>나중에 다시 나옵니다</p>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FbOk(){
  return(
    <div style={{background:'#dcfce7',border:'1.5px solid #86efac',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:10,animation:'fadeIn 0.3s ease'}}>
      <span style={{fontSize:20}}>✅</span>
      <p style={{fontSize:14,color:'#16a34a',fontWeight:700}}>정답입니다!</p>
    </div>
  );
}

function FbNo({onNext}){
  return(
    <div style={{background:'#fee2e2',border:'1.5px solid #fca5a5',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',animation:'fadeIn 0.3s ease'}}>
      <p style={{fontSize:13,color:'#dc2626',fontWeight:700}}>틀렸어요! 나중에 다시 나와요.</p>
      <button onClick={onNext} style={{padding:'7px 14px',background:'#dc2626',borderRadius:8,color:'white',fontSize:13,fontWeight:700,marginLeft:12,flexShrink:0}}>다음 →</button>
    </div>
  );
}

// ── 총괄 리뷰 ──
function Review({onBack}){
  const [allW,setAllW]=useState([]);
  const [queue,setQueue]=useState([]);
  const [solved,setSolved]=useState(new Set());
  const [origCnt,setOrigCnt]=useState(0);
  const [idx,setIdx]=useState(0);
  const [ans,setAns]=useState('');
  const [fb,setFb]=useState(null);
  const [wrongs,setWrongs]=useState(0);
  const [loading,setLoading]=useState(true);
  const [done,setDone]=useState(false);
  const [cnt,setCnt]=useState(20);
  const [started,setStarted]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    sb.from('words').select('*').then(({data})=>{if(data)setAllW(data);setLoading(false);});
  },[]);
  useEffect(()=>{ if(started&&fb===null&&ref.current) ref.current.focus(); },[idx,fb,started]);

  const start=()=>{
    const q=[...allW].sort(()=>Math.random()-0.5).slice(0,cnt);
    setQueue(q);setOrigCnt(q.length);setSolved(new Set());
    setIdx(0);setWrongs(0);setDone(false);setStarted(true);
  };

  const cur=queue[idx];

  const correct=(curSolved)=>{
    const ns=new Set([...curSolved,cur.id]);
    setSolved(ns);setFb('ok');
    setTimeout(()=>{
      setFb(null);setAns('');
      if(ns.size>=origCnt) setDone(true);
      else setIdx(i=>i+1);
    },1000);
  };

  const wrong=()=>{setWrongs(n=>n+1);setFb('no');};
  const wrongNext=()=>{setQueue(q=>[...q,cur]);setFb(null);setAns('');setIdx(i=>i+1);};

  const submit=()=>{
    if(!ans.trim()||fb!==null) return;
    const n=s=>s.trim().toLowerCase().replace(/[-\s]/g,'');
    n(ans)===n(cur.word)?correct(solved):wrong();
  };
  const keyDown=(e)=>{ if(e.key==='Enter'){if(fb===null)submit();else if(fb==='no')wrongNext();} };

  if(loading) return <Spin/>;

  if(!started) return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#ede9fe,#f7f8fc,#dbeafe)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{maxWidth:400,width:'100%',background:'white',borderRadius:24,padding:'44px 36px',textAlign:'center',boxShadow:'0 8px 40px rgba(91,80,232,0.12)',animation:'fadeIn 0.4s ease'}}>
        <div style={{width:56,height:56,background:C.accentLight,borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:26}}>📝</div>
        <p style={{fontSize:22,fontWeight:700,color:C.t1,marginBottom:8}}>총괄 리뷰테스트</p>
        <p style={{fontSize:13,color:C.t2,marginBottom:32,lineHeight:1.7}}>전체 381단어 중 랜덤 출제<br/>한글 뜻 → 영어 단어 입력</p>
        <p style={{fontSize:12,fontWeight:700,color:C.t3,letterSpacing:'0.06em',marginBottom:10}}>문제 수 선택</p>
        <div style={{display:'flex',gap:7,justifyContent:'center',flexWrap:'wrap',marginBottom:28}}>
          {[10,20,30,50,100,381].map(n=>(
            <button key={n} onClick={()=>setCnt(n)}
              style={{padding:'8px 15px',background:cnt===n?C.accent:'#f0f1f8',borderRadius:9,color:cnt===n?'white':C.t2,fontSize:13,fontWeight:cnt===n?700:500,transition:'all 0.15s'}}>
              {n===381?'전체':`${n}문제`}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onBack} style={{flex:1,padding:13,background:'#f0f1f8',borderRadius:12,color:C.t2,fontSize:14,fontWeight:500}}>← 돌아가기</button>
          <button onClick={start} style={{flex:2,padding:13,background:C.accent,borderRadius:12,color:'white',fontSize:15,fontWeight:700}}>시작하기</button>
        </div>
      </div>
    </div>
  );

  if(done) return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{maxWidth:380,width:'100%',background:'white',borderRadius:24,padding:'44px 36px',textAlign:'center',boxShadow:'0 8px 40px rgba(91,80,232,0.12)',animation:'fadeIn 0.5s ease'}}>
        <div style={{fontSize:52,marginBottom:12}}>{wrongs===0?'🏆':wrongs<5?'🎯':'💪'}</div>
        <p style={{fontSize:22,fontWeight:700,color:C.t1,marginBottom:6}}>리뷰테스트 완료!</p>
        <p style={{fontSize:13,color:C.t2,marginBottom:28}}>총 {origCnt}문제 · 틀린 횟수 {wrongs}번</p>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onBack} style={{flex:1,padding:13,background:'#f0f1f8',borderRadius:12,color:C.t2,fontSize:14,fontWeight:500}}>홈으로</button>
          <button onClick={start} style={{flex:1,padding:13,background:C.accent,borderRadius:12,color:'white',fontSize:14,fontWeight:700}}>다시 도전</button>
        </div>
      </div>
    </div>
  );

  if(!cur) return <Spin/>;
  const pct=Math.min((solved.size/origCnt)*100,99);

  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <div style={{background:'white',borderBottom:`1px solid ${C.border}`,padding:'0 20px'}}>
        <div style={{maxWidth:620,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
          <button onClick={onBack} style={{background:'transparent',color:C.t2,fontSize:13,fontWeight:500}}>← 돌아가기</button>
          <p style={{fontSize:13,fontWeight:700,color:C.t1}}>📝 총괄 리뷰테스트</p>
          <p style={{fontFamily:'JetBrains Mono',fontSize:12,color:C.t2}}>{solved.size}/{origCnt}</p>
        </div>
      </div>
      <div style={{height:3,background:'#f0f1f8'}}>
        <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${C.accent},#a78bfa)`,transition:'width 0.4s ease'}}/>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
        <div style={{maxWidth:540,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:10}}>
            <span style={{fontSize:11,padding:'3px 10px',borderRadius:100,background:C.accentLight,color:C.accent,fontWeight:700}}>Day {cur.day}</span>
          </div>
          <div style={{background:'white',borderRadius:20,padding:'40px 32px',textAlign:'center',marginBottom:16,boxShadow:'0 2px 12px rgba(91,80,232,0.07)',animation:'fadeIn 0.3s ease'}}>
            <p style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:14}}>영어 단어를 입력하세요</p>
            <p style={{fontSize:20,color:C.t1,lineHeight:1.7,fontWeight:500}}>{cur.meaning}</p>
          </div>
          <div style={{position:'relative',marginBottom:12}}>
            <input ref={ref} value={ans} onChange={e=>setAns(e.target.value)} onKeyDown={keyDown}
              disabled={fb!==null} placeholder="영어 단어 입력 후 Enter"
              style={{width:'100%',padding:'16px 70px 16px 20px',
                background:fb==='ok'?C.okLight:fb==='no'?C.errLight:'white',
                border:`2px solid ${fb==='ok'?'#86efac':fb==='no'?'#fca5a5':C.border}`,
                borderRadius:14,color:C.t1,fontSize:22,fontFamily:'DM Serif Display',
                boxShadow:'0 2px 8px rgba(0,0,0,0.05)',transition:'border-color 0.2s',
                animation:fb==='no'?'shake 0.4s ease':'none'}}/>
            <button onClick={submit} disabled={fb!==null||!ans.trim()}
              style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
                padding:'8px 14px',background:ans.trim()&&!fb?C.accent:'#f0f1f8',
                borderRadius:9,color:ans.trim()&&!fb?'white':C.t3,fontSize:13,fontWeight:700}}>확인</button>
          </div>
          {fb==='ok'&&<FbOk/>}
          {fb==='no'&&(
            <div style={{background:C.errLight,border:'1.5px solid #fca5a5',borderRadius:12,padding:'14px 18px',animation:'fadeIn 0.3s ease'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <p style={{fontSize:13,color:C.err,fontWeight:700}}>틀렸어요!</p>
                <button onClick={wrongNext} style={{padding:'6px 14px',background:C.err,borderRadius:8,color:'white',fontSize:13,fontWeight:700}}>다음 (Enter)</button>
              </div>
              <p style={{fontSize:13,color:C.t2}}>정답: <span style={{fontFamily:'DM Serif Display',fontSize:18,color:C.t1,fontWeight:700}}>{cur.word}</span></p>
              <p style={{fontSize:11,color:C.t3,marginTop:3}}>나중에 다시 나옵니다</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── 앱 ──
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [screen,setScreen]=useState('home');
  const [homeKey,setHomeKey]=useState(0);
  const goHome=()=>{setScreen('home');setHomeKey(k=>k+1);};

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setLoading(false);});
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user??null));
    return()=>subscription.unsubscribe();
  },[]);

  if(loading) return <Spin/>;
  if(!user) return <Login/>;
  if(screen==='review') return <Review onBack={goHome}/>;
  if(screen!=='home'){
    const {day,round}=screen;
    return <Quiz key={`${day}-${round}`} user={user} day={day} round={round}
      onBack={goHome}
      onDone={(r)=>r===1?setScreen({day,round:2}):goHome()}/>;
  }
  return <Home key={homeKey} user={user}
    onQuiz={(d,r)=>setScreen({day:d,round:r})}
    onReview={()=>setScreen('review')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
